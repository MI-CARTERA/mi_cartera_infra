  ms_ai_classifier:
    build: ./ms_ai_classifier
    container_name: ms_ai_classifier
    restart: always
    ports:
      - "8110:8080"
    environment:
      # si querés DB para guardar reglas/embeddings:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ms_ai_classifier
      SPRING_DATASOURCE_USERNAME: ms_ai_classifier
      SPRING_DATASOURCE_PASSWORD: ms_ai_classifier
